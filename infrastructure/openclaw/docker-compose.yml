# OpenClaw — High-Security Isolated Deployment
# Fully isolated from main infrastructure network
# No Docker socket access, no access to other containers
# NGINX reaches OpenClaw via a dedicated proxy-only network (no other containers)

services:
  openclaw:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw
    restart: unless-stopped
    env_file: .env
    environment:
      - TZ=America/New_York
      - NODE_ENV=production
    volumes:
      # Single mount for all OpenClaw state — avoids root-owned parent dir issue
      # when mounting individual sub-paths into /home/node/.openclaw/
      - ./openclaw-home:/home/node/.openclaw:rw
      # Gmail OAuth credentials (gog CLI)
      - ./gogcli:/home/node/.config/gogcli:rw
    networks:
      - openclaw-net
      - nginx-openclaw
    # Security hardening
    security_opt:
      - no-new-privileges:true
    read_only: false
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

networks:
  openclaw-net:
    driver: bridge
    # Internet egress for Discord/Gmail/Anthropic
    internal: false
  nginx-openclaw:
    # Dedicated NGINX↔OpenClaw proxy network — no other containers
    # NGINX joins this via the main docker-compose.yml
    driver: bridge
    internal: true
