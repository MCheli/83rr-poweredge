[SERVICE]
    Flush         5
    Daemon        Off
    Log_Level     info
    Parsers_File  parsers.conf
    HTTP_Server   On
    HTTP_Listen   0.0.0.0
    HTTP_Port     2020

# Collect Docker container logs
[INPUT]
    Name              tail
    Path              /var/lib/docker/containers/*/*.log
    Parser            docker
    Tag               docker.<container_id>
    Tag_Regex         (?<container_id>[a-z0-9]{64})-json\.log$
    Refresh_Interval  10
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    DB                /var/log/flb_docker.db
    Read_from_Head    On

# Collect Plex Media Server logs (written to file, not stdout)
[INPUT]
    Name              tail
    Path              /plex-logs/Library/Application Support/Plex Media Server/Logs/Plex Media Server.log
    Tag               plex.server
    Refresh_Interval  10
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    DB                /var/log/flb_plex.db
    Read_from_Head    False

# Collect Seafile logs (written to file, not stdout)
[INPUT]
    Name              tail
    Path              /seafile-logs/*.log
    Tag               seafile.logs
    Refresh_Interval  10
    Mem_Buf_Limit     5MB
    Skip_Long_Lines   On
    DB                /var/log/flb_seafile.db
    Read_from_Head    False

# Docker daemon events (start, stop, die, oom, restart, kill, etc.).
# Critical signal for "container crashed" — without this we only see
# absence of logs, which is harder to alert on. Watchtower's image
# updates also surface here as 'die' + 'start' events.
[INPUT]
    Name              docker_events
    Tag               docker.events
    Unix_Path         /var/run/docker.sock

# Extract container name from Docker config
[FILTER]
    Name          lua
    Match         docker.*
    script        /fluent-bit/etc/docker_metadata.lua
    call          add_container_name

# Normalize docker daemon events: lua filter parses the JSON string in
# `message`, pulls nested Actor.Attributes.name to container_name, maps
# Action to level (die/kill/oom -> ERROR), builds a `log` field so events
# appear in dashboards alongside container logs.
[FILTER]
    Name          lua
    Match         docker.events
    script        /fluent-bit/etc/docker_metadata.lua
    call          normalize_docker_event

# Add container name for Plex file logs
[FILTER]
    Name          modify
    Match         plex.*
    Add           container_name plex
    Add           source file

# Add container name for Seafile file logs
[FILTER]
    Name          modify
    Match         seafile.*
    Add           container_name seafile
    Add           source file

# Drop synthetic healthcheck *successes* (status 200 only).
# Failed healthchecks (5xx, no-response) still flow through and end up
# tagged with healthcheck:true via the OpenSearch ingest pipeline so
# alerting can fire on them.
[FILTER]
    Name          grep
    Match         docker.*
    Exclude       log .*"(GET|HEAD) (/health|/api/health|/api/v1/health)( HTTP/[0-9.]+)?".* 200( OK)?\s*-?\s*$

# Drop Plex DEBUG-level noise (~40k docs/day, near-zero signal).
# Plex logs come from a file (tag plex.*), not docker, so match *.
# Format: "May 01, 2026 20:00:03.566 [126330050411320] DEBUG - ..."
[FILTER]
    Name          grep
    Match         *
    Exclude       log ^[A-Z][a-z]+ \d+, \d+ \d+:\d+:\d+\.\d+ \[\d+\] (DEBUG|VERBOSE) -

# Note: previously added environment / infrastructure constants.
# Removed because every doc had identical values — pure storage tax.
# The OpenSearch ingest pipeline will also strip them from any
# in-flight backlog.

# Output to OpenSearch
[OUTPUT]
    Name            opensearch
    Match           *
    Host            opensearch
    Port            9200
    Logstash_Format On
    Logstash_Prefix logs-homelab
    Suppress_Type_Name On
    Retry_Limit     5
    Buffer_Size     5MB
