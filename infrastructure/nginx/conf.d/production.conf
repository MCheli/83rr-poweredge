# Production NGINX Configuration for 83RR PowerEdge Infrastructure
# Currently running services only

# Docker internal DNS resolver - ensures container IPs are re-resolved
# after Watchtower restarts containers with new IPs
resolver 127.0.0.11 valid=10s;

# Upstream definitions
upstream flask_api {
    server flask-api:5000;
}

upstream personal_website {
    server personal-website:3000;
}

upstream opensearch_dashboards {
    server opensearch-dashboards:5601;
}

upstream grafana {
    server grafana:3000;
}

upstream prometheus {
    server prometheus:9090;
}

upstream cadvisor {
    server cadvisor:8080;
}

upstream marimo {
    server marimo:8080;
}

upstream cookbook {
    server cookbook:80;
}

upstream homeassistant {
    server 192.168.1.121:8123;
}

upstream seafile {
    server seafile:80;
}

upstream seafile_fileserver {
    server seafile:8082;
}

upstream seafile_notification {
    server seafile:8083;
}

upstream plex {
    server plex:32400;
}

upstream tallied {
    server tallied:8000;
}

upstream tasks {
    server tasks:8000;
}

upstream openclaw {
    # OpenClaw is on a dedicated proxy-only network (nginx-openclaw)
    # NOT on the main infrastructure network — fully isolated from other services
    server openclaw:18789;
}

# WebSocket upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
}

# ═════════════════════════════════════════════════════════════════════════════
# HTTP to HTTPS Redirect (All domains)
# ═════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name
        www.markcheli.com
        markcheli.com
        flask.markcheli.com
        data.markcheli.com
        cookbook.markcheli.com
        home.markcheli.com
        videos.markcheli.com
        files.markcheli.com
        money.markcheli.com
        tasks.markcheli.com
        status.markcheli.com
        flask-dev.ops.markcheli.com
        logs.ops.markcheli.com
        opensearch.ops.markcheli.com
        dashboard.ops.markcheli.com
        prometheus.ops.markcheli.com
        cadvisor.ops.markcheli.com
        report.ops.markcheli.com
        energy.ops.markcheli.com;

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # NGINX metrics for prometheus (internal only)
    location /nginx_status {
        stub_status on;
        access_log off;
        allow 172.16.0.0/12;  # Docker networks
        allow 192.168.0.0/16; # Local networks
        allow 10.0.0.0/8;     # Private networks
        deny all;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ═════════════════════════════════════════════════════════════════════════════
# PUBLIC SERVICES (*.markcheli.com)
# ═════════════════════════════════════════════════════════════════════════════

# Flask API (flask.markcheli.com)
server {
    listen 443 ssl;
    http2 on;
    server_name flask.markcheli.com;

    ssl_certificate /etc/nginx/certs/wildcard-markcheli.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard-markcheli.key;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

    location / {
        # Rate limiting for API
        limit_req zone=api burst=50 nodelay;

        # Variable forces DNS re-resolution after container restarts (Watchtower)
        set $flask_backend http://flask-api:5000;
        proxy_pass $flask_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Personal Website (www.markcheli.com)
server {
    listen 443 ssl;
    http2 on;
    server_name www.markcheli.com markcheli.com;

    ssl_certificate /etc/nginx/certs/wildcard-markcheli.crt;
