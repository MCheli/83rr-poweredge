    server_name energy.ops.markcheli.com;

    ssl_certificate /etc/nginx/certs/letsencrypt-ops-markcheli.crt;
    ssl_certificate_key /etc/nginx/certs/letsencrypt-ops-markcheli.key;

    add_header Strict-Transport-Security "max-age=31536000" always;

    # LAN-only access
    allow 192.168.1.0/24;
    deny all;

    location / {
        set $energy_monitor_backend http://energy-monitor:8000;
        proxy_pass $energy_monitor_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}

# Default HTTPS - catch-all for undefined domains
server {
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/nginx/certs/wildcard-markcheli.crt;
    ssl_certificate_key /etc/nginx/certs/wildcard-markcheli.key;

    return 404;
}
