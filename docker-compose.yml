# 83RR PowerEdge Infrastructure
# Base Docker Compose configuration for all services
# Auto-loads docker-compose.override.yml for local development
# Use docker-compose.prod.yml for production deployment

# Shared logging configuration to prevent disk space issues
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ═════════════════════════════════════════════════════════════════════════════
  # NGINX Reverse Proxy
  # ═════════════════════════════════════════════════════════════════════════════
  nginx:
    build:
      context: ./infrastructure/nginx
      dockerfile: Dockerfile
    container_name: nginx
    restart: unless-stopped
    logging: *default-logging
    environment:
      - INFRASTRUCTURE_ENV=${INFRASTRUCTURE_ENV:-production}
    ports:
      - "80:80"
      - "443:443"
      # Note: Minecraft port 25565 added in prod override (docker-compose.prod.yml)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infrastructure/nginx/certs:/etc/nginx/certs:ro
      # Note: nginx logs go to stdout/stderr (symlinks in Dockerfile) for Docker log capture
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - infrastructure
      - nginx-openclaw

  # ═════════════════════════════════════════════════════════════════════════════
  # Personal Website (Nuxt.js)
  # Image published from: github.com/mcheli/PersonalWebsite
  # ═════════════════════════════════════════════════════════════════════════════
  personal-website:
    image: ghcr.io/mcheli/personal-website:latest
    container_name: personal-website
    restart: unless-stopped
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - NODE_ENV=production
      - NUXT_PUBLIC_API_BASE=/api
      - API_URL=http://flask-api:5000
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ═════════════════════════════════════════════════════════════════════════════
  # Cookbook Website (Static Recipe Site)
  # Image published from: github.com/mcheli/cookbook
  # ═════════════════════════════════════════════════════════════════════════════
  cookbook:
    image: ghcr.io/mcheli/cookbook:latest
    container_name: cookbook
    restart: unless-stopped
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ═════════════════════════════════════════════════════════════════════════════
  # Flask API Service
  # Image published from: github.com/mcheli/PersonalWebsite
  # ═════════════════════════════════════════════════════════════════════════════
  flask-api:
    image: ghcr.io/mcheli/flask-api:latest
    container_name: flask-api
    restart: unless-stopped
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://user:pass@postgres:5432/dbname
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ═════════════════════════════════════════════════════════════════════════════
  # Marimo (Reactive Python Notebooks)
  # ═════════════════════════════════════════════════════════════════════════════
  marimo:
    image: ghcr.io/marimo-team/marimo:latest-data
    container_name: marimo
    restart: unless-stopped
    logging: *default-logging
    environment:
      - TZ=${TZ:-America/New_York}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    command:
      - marimo
      - edit
      - --host=0.0.0.0
      - --port=8080
      - --token-password=${MARIMO_PASSWORD}
      - --headless
      - --proxy=https://data.markcheli.com
      - /data
    volumes:
      - marimo_data:/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - infrastructure

  # ═════════════════════════════════════════════════════════════════════════════
  # OpenSearch (Logging Infrastructure)
  # Note: Using 'latest' because data format requires matching version; pin after fresh install
  # ═════════════════════════════════════════════════════════════════════════════
  opensearch:
    image: opensearchproject/opensearch:2.19.0  # Pinned for security
    container_name: opensearch
    restart: unless-stopped
    logging: *default-logging
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node1
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - "DISABLE_INSTALL_DEMO_CONFIG=true"
      - "DISABLE_SECURITY_PLUGIN=true"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q '\"status\":\"green\"\\|\"status\":\"yellow\"'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - infrastructure

  # ═════════════════════════════════════════════════════════════════════════════
  # OpenSearch Dashboards (Logging UI)
  # ═════════════════════════════════════════════════════════════════════════════
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.19.0  # Match OpenSearch version
    container_name: opensearch-dashboards
    restart: unless-stopped
    logging: *default-logging
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - "DISABLE_SECURITY_DASHBOARDS_PLUGIN=true"
    depends_on:
      - opensearch
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:5601/api/status | grep -q 'available'"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    networks:
      - infrastructure

  # ═════════════════════════════════════════════════════════════════════════════
  # Fluent Bit (Log Shipper)
  # ═════════════════════════════════════════════════════════════════════════════
  fluent-bit:
    image: fluent/fluent-bit:3.2
    container_name: fluent-bit
    restart: unless-stopped
    logging: *default-logging
    user: root
    volumes:
      - ./infrastructure/fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./infrastructure/fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - ./infrastructure/fluent-bit/docker_metadata.lua:/fluent-bit/etc/docker_metadata.lua:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - fluent_bit_data:/var/log
      - plex_config:/plex-logs:ro
      - /storage/seafile/seafile/logs:/seafile-logs:ro
    depends_on:
      - opensearch
    # Note: Fluent Bit distroless image has no shell utilities for health checks
    # Service health can be verified via: docker logs fluent-bit | grep -i error
    networks:
      - infrastructure

  # ═════════════════════════════════════════════════════════════════════════════
  # Minecraft Server
  # ═════════════════════════════════════════════════════════════════════════════
  minecraft:
    image: itzg/minecraft-server:java21
    container_name: minecraft
    restart: unless-stopped
    logging: *default-logging
    environment:
      - EULA=TRUE
      - TYPE=PAPER
      - VERSION=LATEST
      - MEMORY=2G
      - DIFFICULTY=normal
      - MOTD="83RR PowerEdge Minecraft Server"
      - ENABLE_WHITELIST=false
    volumes:
      - minecraft_data:/data
    networks:
      - infrastructure

  # ═════════════════════════════════════════════════════════════════════════════
  # Monitoring: Prometheus (Metrics Database)
  # ═════════════════════════════════════════════════════════════════════════════
  prometheus:
    image: prom/prometheus:v3.2.1
    container_name: prometheus
    restart: unless-stopped
    logging: *default-logging
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--storage.tsdb.retention.time=30d'
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - infrastructure

  # ═════════════════════════════════════════════════════════════════════════════
  # Monitoring: Grafana (Visualization Dashboards)
  # ═════════════════════════════════════════════════════════════════════════════
  grafana:
    image: grafana/grafana:11.5.2
    container_name: grafana
    restart: unless-stopped
    logging: *default-logging
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infrastructure/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - infrastructure

  # ═════════════════════════════════════════════════════════════════════════════
  # Monitoring: cAdvisor (Container Metrics)
  # ═════════════════════════════════════════════════════════════════════════════
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.52.1
    container_name: cadvisor
    restart: unless-stopped
    logging: *default-logging
    user: "0"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - infrastructure

  # ═════════════════════════════════════════════════════════════════════════════
  # Monitoring: NGINX Exporter (NGINX Metrics)
  # ═════════════════════════════════════════════════════════════════════════════
  nginx-exporter:
    image: nginx/nginx-prometheus-exporter:1.4
    container_name: nginx-exporter
    restart: unless-stopped
    logging: *default-logging
    command:
      - '--nginx.scrape-uri=http://nginx:80/nginx_status'
    depends_on:
      - nginx
    networks:
      - infrastructure

  # ═════════════════════════════════════════════════════════════════════════════
  # Monitoring: Node Exporter (Host System Metrics)
  # ═════════════════════════════════════════════════════════════════════════════
  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: node-exporter
    restart: unless-stopped
    logging: *default-logging
    command:
      - '--path.rootfs=/host'
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    pid: host
    volumes:
      - '/:/host:ro,rslave'
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9100/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - infrastructure

# ═════════════════════════════════════════════════════════════════════════════
  # Plex Media Server
  # ═════════════════════════════════════════════════════════════════════════════
  plex:
    image: plexinc/pms-docker:latest
    container_name: plex
    restart: unless-stopped
    logging: *default-logging
    environment:
      - TZ=America/New_York
      - PLEX_CLAIM=${PLEX_CLAIM:-}
      - ALLOWED_NETWORKS=172.24.0.0/16,192.168.1.0/24
    ports:
      - "32400:32400"
      - "1900:1900/udp"
      - "32469:32469"
      - "5353:5353/udp"
    volumes:
      - plex_config:/config
      - /storage/media:/data:ro
    networks:
      - infrastructure

  # ═════════════════════════════════════════════════════════════════════════════
  # Tallied (Personal Finance Dashboard)
  # Image published from: github.com/mcheli/tallied
  # ═════════════════════════════════════════════════════════════════════════════
  tallied-db:
    image: postgres:16-alpine
    container_name: tallied-db
    restart: unless-stopped
    logging: *default-logging
    command: >
      postgres
      -c ssl=on
      -c ssl_cert_file=/var/lib/postgresql/data/server.crt
      -c ssl_key_file=/var/lib/postgresql/data/server.key
      -c hba_file=/etc/postgresql/pg_hba.conf
    environment:
      - POSTGRES_USER=tallied
      - POSTGRES_PASSWORD=${TALLIED_DB_PASSWORD}
      - POSTGRES_DB=tallied
    volumes:
      - tallied_db_data:/var/lib/postgresql/data
      - ./docker/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
      - ./docker/postgres/init-ssl.sh:/docker-entrypoint-initdb.d/init-ssl.sh:ro
    ports:
      - "5432:5432"
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tallied -d tallied"]
      interval: 10s
      timeout: 5s
      retries: 5

  tallied:
    image: ghcr.io/mcheli/tallied:latest
    container_name: tallied
    restart: unless-stopped
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      tallied-db:
        condition: service_healthy
    env_file: .env
    environment:
      - APP_ROLE=web
      - DATABASE_URL=postgresql://tallied_app:${TALLIED_APP_DB_PASSWORD}@tallied-db:5432/tallied
      - FINANCE_DATABASE_URL=postgresql://tallied_app:${TALLIED_APP_DB_PASSWORD}@tallied-db:5432/tallied
      - FINANCE_BASE_URL=https://money.markcheli.com
      - FINANCE_DEV_MODE=false
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  tallied-scheduler:
    image: ghcr.io/mcheli/tallied:latest
    container_name: tallied-scheduler
    restart: unless-stopped
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      tallied-db:
        condition: service_healthy
      tallied:
        condition: service_healthy
    env_file: .env
    command: ["python", "-m", "app.scheduler"]
    environment:
      - APP_ROLE=scheduler
      - DATABASE_URL=postgresql://tallied_app:${TALLIED_APP_DB_PASSWORD}@tallied-db:5432/tallied
      - FINANCE_DATABASE_URL=postgresql://tallied_app:${TALLIED_APP_DB_PASSWORD}@tallied-db:5432/tallied
      - FINANCE_BASE_URL=https://money.markcheli.com
      - FINANCE_DEV_MODE=false
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD-SHELL", "grep -q python /proc/1/comm"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ═════════════════════════════════════════════════════════════════════════════
  # Tasks (Cycle-based Todo App)
  # Image published from: github.com/mcheli/tasks
  # ═════════════════════════════════════════════════════════════════════════════
  tasks-db:
    image: postgres:16-alpine
    container_name: tasks-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      - POSTGRES_USER=tasks
      - POSTGRES_PASSWORD=${TASKS_DB_PASSWORD}
      - POSTGRES_DB=tasks
    volumes:
      - tasks_db_data:/var/lib/postgresql/data
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks -d tasks"]
      interval: 10s
      timeout: 5s
      retries: 5

  tasks:
    image: ghcr.io/mcheli/tasks:latest
    container_name: tasks
    restart: unless-stopped
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      tasks-db:
        condition: service_healthy
    env_file: .env
    environment:
      - TASKS_ENV=${TASKS_ENV}
      - TASKS_ENABLE_DOCS=${TASKS_ENABLE_DOCS}
      - TASKS_DATABASE_URL=${TASKS_DATABASE_URL}
      - TASKS_JWT_SECRET=${TASKS_JWT_SECRET}
      - TASKS_COOKIE_SECURE=${TASKS_COOKIE_SECURE}
      - TASKS_ALLOWED_ORIGINS=${TASKS_ALLOWED_ORIGINS}
      - TASKS_GOOGLE_CLIENT_ID=${TASKS_GOOGLE_CLIENT_ID}
      - TASKS_GOOGLE_CLIENT_SECRET=${TASKS_GOOGLE_CLIENT_SECRET}
      - TASKS_GOOGLE_REDIRECT_URI=${TASKS_GOOGLE_REDIRECT_URI}
      - TASKS_API_KEY_PEPPER=${TASKS_API_KEY_PEPPER}
      - TASKS_TEST_USER_EMAIL=${TASKS_TEST_USER_EMAIL}
      - TASKS_TEST_USER_PASSWORD=${TASKS_TEST_USER_PASSWORD}
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  # ═════════════════════════════════════════════════════════════════════════════
  # Daily Report (thermal-printer report generator)
  # Image published from: github.com/MCheli/daily-report
  # ═════════════════════════════════════════════════════════════════════════════
  daily-report:
    image: ghcr.io/mcheli/daily-report:latest
    container_name: daily-report
    restart: unless-stopped
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    env_file: .env
    environment:
      - TZ=America/New_York
      - REPORT_TIMES=07:00
      - PROM_URL=http://prometheus:9090
      - DAILY_REPORT_PORT=8080
      # ANTHROPIC_API_KEY is shadowed via DAILY_REPORT_ANTHROPIC_API_KEY so it
      # doesn't clash with the jupyter service's own ANTHROPIC_API_KEY.
      - ANTHROPIC_API_KEY=${DAILY_REPORT_ANTHROPIC_API_KEY}
      - TALLIED_API_KEY=${TALLIED_API_KEY}
      - TASKS_API_KEY=${TASKS_API_KEY}
      - HOME_ASSISTANT_TOKEN=${HOME_ASSISTANT_TOKEN}
      - CALENDAR_ICS_URL=${CALENDAR_ICS_URL}
      - DAILY_REPORT_API_TOKEN=${DAILY_REPORT_API_TOKEN}
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ═════════════════════════════════════════════════════════════════════════════
  # Energy Monitor (panel-tool — circuit breaker → CT channel mapper)
  # Image published from: github.com/MCheli/energy-monitor
  # LAN-only (energy.ops.markcheli.com); ships without auth — keep behind
  # the *.ops nginx allowlist. ESPHome / HA URLs are configured in-app.
  # ═════════════════════════════════════════════════════════════════════════════
  energy-monitor-db:
    image: postgres:16-alpine
    container_name: energy-monitor-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      - POSTGRES_USER=panel_tool
      - POSTGRES_PASSWORD=${ENERGY_MONITOR_DB_PASSWORD}
      - POSTGRES_DB=panel_tool
    volumes:
      - energy_monitor_db_data:/var/lib/postgresql/data
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U panel_tool"]
      interval: 10s
      timeout: 5s
      retries: 5

  energy-monitor:
    image: ghcr.io/mcheli/panel-tool:latest
    container_name: energy-monitor
    restart: unless-stopped
    logging: *default-logging
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    depends_on:
      energy-monitor-db:
        condition: service_healthy
    env_file: .env
    environment:
      - DATABASE_URL=postgresql://panel_tool:${ENERGY_MONITOR_DB_PASSWORD}@energy-monitor-db:5432/panel_tool
      - SECRET_KEY=${ENERGY_MONITOR_SECRET_KEY}
      - PANEL_TOOL_DATA_DIR=/data
    volumes:
      - energy_monitor_data:/data
    networks:
      - infrastructure
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ═════════════════════════════════════════════════════════════════════════════
  # Seafile (Dropbox Replacement)
  # ═════════════════════════════════════════════════════════════════════════════
  seafile-db:
    image: mariadb:10.11
    container_name: seafile-db
    restart: unless-stopped
    logging: *default-logging
    environment:
      - MYSQL_ROOT_PASSWORD=${SEAFILE_DB_ROOT_PASSWORD}
      - MYSQL_LOG_CONSOLE=true
    volumes:
      - seafile_db:/var/lib/mysql
    networks:
      - infrastructure

  seafile-memcached:
    image: memcached:1.6
    container_name: seafile-memcached
    restart: unless-stopped
    logging: *default-logging
    entrypoint: memcached -m 256
    networks:
      - infrastructure

  seafile:
    image: seafileltd/seafile-mc:11.0.13  # Pinned for security
    container_name: seafile
    restart: unless-stopped
    logging: *default-logging
    depends_on:
      - seafile-db
      - seafile-memcached
    environment:
      - DB_HOST=seafile-db
      - DB_ROOT_PASSWD=${SEAFILE_DB_ROOT_PASSWORD}
      - SEAFILE_ADMIN_EMAIL=${SEAFILE_ADMIN_EMAIL}
      - SEAFILE_ADMIN_PASSWORD=${SEAFILE_ADMIN_PASSWORD}
      - SEAFILE_SERVER_HOSTNAME=files.markcheli.com
      - SEAFILE_SERVER_LETSENCRYPT=false
      - SEAFILE_SERVICE_URL=https://files.markcheli.com
      - SEAFILE_FILE_SERVER_ROOT=https://files.markcheli.com/seafhttp
    volumes:
      - /storage/seafile:/shared
    networks:
      - infrastructure

  # ═════════════════════════════════════════════════════════════════════════════
  # Voice AI Services (LAN-only, for HeyClawy ESP32 devices)
  # ═════════════════════════════════════════════════════════════════════════════
  edge-tts:
    image: travisvn/openai-edge-tts:latest
    container_name: edge-tts
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "5050:5050"
    environment:
      - DEFAULT_VOICE=en-US-AndrewNeural
      - DEFAULT_LANGUAGE=en-US
      - REQUIRE_API_KEY=false
    networks:
      - voice-services
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5050/v1/models')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  faster-whisper:
    image: fedirz/faster-whisper-server:latest-cuda
    container_name: faster-whisper
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "5051:8000"
    environment:
      - WHISPER__MODEL=Systran/faster-whisper-small
      - WHISPER__DEVICE=cpu
      - WHISPER__COMPUTE_TYPE=int8
    networks:
      - voice-services
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ═════════════════════════════════════════════════════════════════════════════
  # Watchtower (Automatic Container Updates)
  # Monitors ghcr.io images and auto-deploys when new versions are pushed
  # ═════════════════════════════════════════════════════════════════════════════
  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    logging: *default-logging
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=300
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_ROLLING_RESTART=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      - WATCHTOWER_NOTIFICATIONS=shoutrrr
      - WATCHTOWER_NOTIFICATION_URL=logger://
      - WATCHTOWER_LIFECYCLE_HOOKS=false
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/mcheli/.docker/config.json:/config.json:ro
    networks:
      - infrastructure

# ═════════════════════════════════════════════════════════════════════════════
# Networks
# ═════════════════════════════════════════════════════════════════════════════
networks:
  infrastructure:
    driver: bridge
  nginx-openclaw:
    # Dedicated proxy network: only NGINX and OpenClaw
    # Created by infrastructure/openclaw/docker-compose.yml
    external: true
    name: openclaw_nginx-openclaw
  voice-services:
    # LAN-only network for voice AI services (EdgeTTS, faster-whisper)
    driver: bridge

# ═════════════════════════════════════════════════════════════════════════════
# Volumes
# ═════════════════════════════════════════════════════════════════════════════
volumes:
  marimo_data:
  opensearch_data:
  fluent_bit_data:
  minecraft_data:
  prometheus_data:
  grafana_data:
  plex_config:
  tallied_db_data:
  tasks_db_data:
  energy_monitor_db_data:
  energy_monitor_data:
  seafile_db: