# pg_hba.conf — Tallied PostgreSQL access control
#
# Superuser (tallied) and app role (tallied_app): local/Docker only
# Tenant credential roles (tld_*): internet access, SSL required

# TYPE  DATABASE  USER         ADDRESS          METHOD

# Local socket connections
local   all       tallied                       trust
local   all       tallied_app                   trust

# Docker-internal connections (172.16.0.0/12 covers Docker bridge networks)
host    all       tallied       172.16.0.0/12   scram-sha-256
host    all       tallied_app   172.16.0.0/12   scram-sha-256

# Tenant credential roles (tld_*) — internet access, SSL required
hostssl all       all           0.0.0.0/0       scram-sha-256
hostssl all       all           ::/0            scram-sha-256
