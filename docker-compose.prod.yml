# Production Deployment Configuration
# Use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# All custom services pull from GitHub Container Registry

services:
  # ═════════════════════════════════════════════════════════════════════════════
  # NGINX - Production Configuration
  # ═════════════════════════════════════════════════════════════════════════════
  nginx:
    image: ghcr.io/mcheli/nginx:latest
    ports:
      - "80:80"       # HTTP (redirects to HTTPS)
      - "443:443"     # HTTPS with real certificates
    volumes:
      - ./infrastructure/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./infrastructure/nginx/certs:/etc/nginx/certs:ro  # Cloudflare Origin Certificates
      # nginx logs go to stdout/stderr for Docker log capture by Fluent Bit

  # Personal Website and Flask API use pre-built images from base compose
  # (ghcr.io/mcheli/personal-website and ghcr.io/mcheli/flask-api)
  # No production overrides needed - configured in base docker-compose.yml

  # ═════════════════════════════════════════════════════════════════════════════
  # Tallied - Production Images
  # ═════════════════════════════════════════════════════════════════════════════
  tallied-db:
    image: postgres:16-alpine

  tallied:
    image: ghcr.io/mcheli/tallied:latest

  tasks-db:
    image: postgres:16-alpine

  tasks:
    image: ghcr.io/mcheli/tasks:latest

  opensearch:
    volumes:
      - opensearch_data:/usr/share/opensearch/data  # Production data volume

  opensearch-dashboards: {}  # No changes from base - accessed via NGINX

  prometheus:
    volumes:
      - ./infrastructure/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus  # Production data volume

  grafana:
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana  # Production data volume
      - ./infrastructure/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./infrastructure/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro

  cadvisor: {}  # No changes from base - accessed via NGINX

  minecraft:
    ports:
      - "25565:25565"  # Minecraft server port (direct connection, not proxied)
    volumes:
      - minecraft_data:/data  # Production data volume

# ═════════════════════════════════════════════════════════════════════════════
# Production Environment Variables
# Load from .env file in project root on production server
# ═════════════════════════════════════════════════════════════════════════════